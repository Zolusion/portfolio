<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Orbitron', sans-serif;
            background: black;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: #000;
            color: #fff;
            border-bottom: 1px solid white;
        }

        .navbar h1 {
            font-size: 1.5rem;
        }

        .navbar a {
            text-decoration: none;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .navbar a:hover {
            background-color: #fff;
            color: #000;
        }

        main h2 {
            text-align: center;
            margin: 1rem 0;
            color: #fff;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 9%;
        }

        .work {
            background-color: white;
            width: 400px;
            height: 300px;
            display: inline-block;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin: 2rem;
        }

        .work img {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        .workname h3 {
            text-align: center;
            margin: 1rem 0;
            color: white;
        }

        .workname a {
            text-decoration: none;
            color: #fff;
        }

        .workname a:hover {
            text-decoration: underline;
            animation: backwards 1s;
            transition: all 1s ease;
            color: #FFCC00;
        }

    </style>
</head>
<body>
    <div class="navbar">
        <h1>Furkan Baykal</h1>
        <a href="./index.html">Home</a>
        <a href="./aboutme.html">About me</a>
        <a href="./portfolio.html">Portfolio</a>
        <a href="./internship.html">Internship</a>
        <a href="./contact.html">Contact</a>
    </div>

    </main>
    <div class="container">

            <img src="../static/Afbeelding1.png">
            <div class="workname">
                <a href="https://www.specialistinreclame.nl/"><h3>Specialistinreclame.nl</h3></a>
            </div>
        </div>
        <div class="work">
            <img src="../static/verkeer.png">
            <div class="workname">
                <a href="#"><h3>Verkeerslichten</h3></a>

            </div>
